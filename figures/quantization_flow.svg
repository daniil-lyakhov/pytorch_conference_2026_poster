<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#444444">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#7627bb">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#202124">torch.ao Post-Training Quantization Flow</text>

  <!-- ========== ROW 1: Float Model + Example Input ========== -->
  <rect x="100" y="55" width="220" height="50" rx="8" ry="8" fill="#d2e3fc" stroke="#1a73e8" stroke-width="2"/>
  <text x="210" y="77" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a73e8">Float Model</text>
  <text x="210" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">(Python / Eager Mode)</text>

  <rect x="580" y="55" width="220" height="50" rx="8" ry="8" fill="#d2e3fc" stroke="#1a73e8" stroke-width="2"/>
  <text x="690" y="77" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a73e8">Example Input</text>
  <text x="690" y="95" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">(Calibration Data)</text>

  <!-- Arrows converging down -->
  <line x1="260" y1="105" x2="400" y2="140" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="105" x2="500" y2="140" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 2: torch.export ========== -->
  <rect x="330" y="140" width="240" height="48" rx="8" ry="8" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="450" y="161" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#137333">Step 1: torch.export</text>
  <text x="450" y="179" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Capture FX Graph in ATen</text>

  <!-- Arrow down -->
  <line x1="450" y1="188" x2="450" y2="210" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== Intermediate: FX Graph ========== -->
  <rect x="345" y="212" width="210" height="34" rx="6" ry="6" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="234" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#444444" font-style="italic">FX Graph in ATen</text>

  <!-- Arrow down -->
  <line x1="450" y1="246" x2="450" y2="270" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 3: prepare_pt2e ========== -->
  <rect x="300" y="272" width="300" height="48" rx="8" ry="8" fill="#feefc3" stroke="#f9ab00" stroke-width="2"/>
  <text x="450" y="293" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b06000">Step 2: prepare_pt2e</text>
  <text x="450" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Insert Observers and Fold BatchNorm</text>

  <!-- OpenVINOQuantizer box -->
  <rect x="660" y="272" width="210" height="48" rx="8" ry="8" fill="#e8d5f5" stroke="#9334e6" stroke-width="2"/>
  <text x="765" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7627bb">OpenVINOQuantizer</text>
  <text x="765" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">preset, model_type, ...</text>

  <!-- Arrow from quantizer to prepare_pt2e -->
  <line x1="660" y1="296" x2="605" y2="296" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- Arrow down -->
  <line x1="450" y1="320" x2="450" y2="344" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== Intermediate: Calibrate ========== -->
  <rect x="345" y="346" width="210" height="34" rx="6" ry="6" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="368" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#444444" font-style="italic">Calibrate with Data</text>

  <!-- Arrow down -->
  <line x1="450" y1="380" x2="450" y2="404" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 4: convert_pt2e ========== -->
  <rect x="300" y="406" width="300" height="48" rx="8" ry="8" fill="#feefc3" stroke="#f9ab00" stroke-width="2"/>
  <text x="450" y="427" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b06000">Step 3: convert_pt2e</text>
  <text x="450" y="445" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Produce Quantized Model</text>

  <!-- Arrow down -->
  <line x1="450" y1="454" x2="450" y2="478" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 5: Quantized Model ========== -->
  <rect x="320" y="480" width="260" height="36" rx="8" ry="8" fill="#fadbd8" stroke="#ea4335" stroke-width="2"/>
  <text x="450" y="503" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#c5221f">Quantized Model</text>

  <!-- ========== Optional: quantize_pt2e (left side) ========== -->
  <rect x="20" y="390" width="230" height="64" rx="8" ry="8" fill="#e8d5f5" stroke="#9334e6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="135" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7627bb">Optional: quantize_pt2e</text>
  <text x="135" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">SmoothQuant, BiasCorrection</text>
  <text x="135" y="446" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">for improved accuracy</text>

  <!-- Arrow from optional to convert_pt2e -->
  <line x1="250" y1="430" x2="296" y2="430" stroke="#7627bb" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead-purple)"/>

</svg>
