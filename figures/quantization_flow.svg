<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#444444">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#137333">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#7627bb">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- ==================== COLUMN HEADERS ==================== -->
  <rect x="40" y="12" width="440" height="38" rx="6" ry="6" fill="#e8eaed" stroke="#999999" stroke-width="1.5"/>
  <text x="260" y="37" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333333">Standard torch.ao Flow</text>

  <rect x="620" y="12" width="440" height="38" rx="6" ry="6" fill="#e8d5f5" stroke="#9334e6" stroke-width="1.5"/>
  <text x="840" y="37" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7627bb">NNCF quantize_pt2e / compress_pt2e</text>

  <!-- Divider line -->
  <line x1="550" y1="12" x2="550" y2="670" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="8,6"/>

  <!-- ==================== LEFT COLUMN: Standard torch.ao ==================== -->

  <!-- Float Model -->
  <rect x="140" y="70" width="240" height="48" rx="8" ry="8" fill="#d2e3fc" stroke="#1a73e8" stroke-width="2"/>
  <text x="260" y="91" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a73e8">Float Model</text>
  <text x="260" y="109" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">(Eager Mode)</text>

  <line x1="260" y1="118" x2="260" y2="148" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 1: torch.export -->
  <rect x="130" y="150" width="260" height="48" rx="8" ry="8" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="260" y="171" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#137333">torch.export</text>
  <text x="260" y="189" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Capture FX Graph</text>

  <line x1="260" y1="198" x2="260" y2="228" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: prepare_pt2e -->
  <rect x="130" y="230" width="260" height="48" rx="8" ry="8" fill="#feefc3" stroke="#f9ab00" stroke-width="2"/>
  <text x="260" y="251" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b06000">prepare_pt2e(model, quantizer)</text>
  <text x="260" y="269" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Insert Observers</text>

  <line x1="260" y1="278" x2="260" y2="308" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Calibrate -->
  <rect x="155" y="310" width="210" height="38" rx="6" ry="6" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="260" y="334" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#444444" font-style="italic">Calibrate with Data</text>

  <line x1="260" y1="348" x2="260" y2="378" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: convert_pt2e -->
  <rect x="130" y="380" width="260" height="48" rx="8" ry="8" fill="#feefc3" stroke="#f9ab00" stroke-width="2"/>
  <text x="260" y="401" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b06000">convert_pt2e(model)</text>
  <text x="260" y="419" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Produce Quantized Model</text>

  <line x1="260" y1="428" x2="260" y2="458" stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Quantized Model -->
  <rect x="145" y="460" width="230" height="40" rx="8" ry="8" fill="#fadbd8" stroke="#ea4335" stroke-width="2"/>
  <text x="260" y="485" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#c5221f">Quantized Model</text>

  <!-- Limitations note -->
  <rect x="90" y="530" width="340" height="62" rx="8" ry="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="260" y="551" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Limitations</text>
  <text x="260" y="569" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">No data-aware accuracy improvement</text>
  <text x="260" y="584" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">No weight compression for LLMs</text>

  <!-- ==================== RIGHT COLUMN: NNCF ==================== -->

  <!-- Float Model -->
  <rect x="720" y="70" width="240" height="48" rx="8" ry="8" fill="#d2e3fc" stroke="#1a73e8" stroke-width="2"/>
  <text x="840" y="91" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a73e8">Float Model</text>
  <text x="840" y="109" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">(Eager Mode)</text>

  <line x1="840" y1="118" x2="840" y2="148" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- Step 1: torch.export (shared) -->
  <rect x="710" y="150" width="260" height="48" rx="8" ry="8" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="840" y="171" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#137333">torch.export</text>
  <text x="840" y="189" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Capture FX Graph</text>

  <!-- Arrow splits into two paths -->
  <line x1="780" y1="198" x2="720" y2="228" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  <line x1="900" y1="198" x2="960" y2="228" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- ===== Left sub-path: quantize_pt2e ===== -->
  <rect x="610" y="230" width="220" height="58" rx="8" ry="8" fill="#e8d5f5" stroke="#9334e6" stroke-width="2"/>
  <text x="720" y="253" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7627bb">quantize_pt2e</text>
  <text x="720" y="271" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">+ SmoothQuant</text>
  <text x="720" y="283" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">+ BiasCorrection</text>

  <!-- quantize_pt2e detail box -->
  <rect x="610" y="308" width="220" height="90" rx="6" ry="6" fill="#f3e8ff" stroke="#b388d9" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="720" y="326" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7627bb" font-weight="bold">Internally runs:</text>
  <text x="720" y="344" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">prepare_pt2e + SmoothQuant</text>
  <text x="720" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">Calibrate with Data</text>
  <text x="720" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">convert_pt2e + BiasCorrection</text>

  <line x1="720" y1="398" x2="720" y2="428" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- Quantized Model (left) -->
  <rect x="625" y="430" width="190" height="40" rx="8" ry="8" fill="#fadbd8" stroke="#ea4335" stroke-width="2"/>
  <text x="720" y="455" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c5221f">Quantized Model</text>

  <!-- ===== Right sub-path: compress_pt2e ===== -->
  <rect x="860" y="230" width="220" height="58" rx="8" ry="8" fill="#e8d5f5" stroke="#9334e6" stroke-width="2"/>
  <text x="970" y="253" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7627bb">compress_pt2e</text>
  <text x="970" y="271" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">+ AWQ, GPTQ</text>
  <text x="970" y="283" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">+ Scale Estimation</text>

  <!-- compress_pt2e detail box -->
  <rect x="860" y="308" width="220" height="90" rx="6" ry="6" fill="#f3e8ff" stroke="#b388d9" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="970" y="326" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7627bb" font-weight="bold">Internally runs:</text>
  <text x="970" y="344" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">AWQ scale search</text>
  <text x="970" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">GPTQ layer-wise quant</text>
  <text x="970" y="376" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555555">INT4/INT8 weight packing</text>

  <line x1="970" y1="398" x2="970" y2="428" stroke="#7627bb" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- Compressed Model (right) -->
  <rect x="875" y="430" width="190" height="40" rx="8" ry="8" fill="#fadbd8" stroke="#ea4335" stroke-width="2"/>
  <text x="970" y="455" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c5221f">Compressed Model</text>

  <!-- Advantages note -->
  <rect x="650" y="500" width="400" height="80" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="850" y="521" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Advantages over standard torch.ao</text>
  <text x="850" y="540" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">SmoothQuant + BiasCorrection improve quantized accuracy</text>
  <text x="850" y="556" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">AWQ + GPTQ + Scale Estimation reduce LLM perplexity</text>
  <text x="850" y="572" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">Drop-in: works with any torch.ao Quantizer</text>

  <!-- ==================== SHARED: Quantizer box ==================== -->
  <rect x="395" y="620" width="310" height="48" rx="8" ry="8" fill="#e8d5f5" stroke="#9334e6" stroke-width="2"/>
  <text x="550" y="640" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7627bb">Quantizer (shared by both flows)</text>
  <text x="550" y="657" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555555">OpenVINOQuantizer, XNNPACKQuantizer, ...</text>

</svg>
