<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <linearGradient id="grad-input" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-process" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-output" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-opt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#212121">Scale Estimation for 4-bit Weight Compression</text>

  <!-- ===== Row 1: Inputs ===== -->

  <!-- Weight matrix W -->
  <rect x="30" y="80" width="200" height="80" rx="10" fill="url(#grad-input)" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565C0">W</text>
  <text x="130" y="140" text-anchor="middle" font-size="13" fill="#333">FP16 Weight Matrix</text>

  <!-- Calibration data X -->
  <rect x="30" y="190" width="200" height="80" rx="10" fill="url(#grad-input)" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="225" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565C0">X</text>
  <text x="130" y="250" text-anchor="middle" font-size="13" fill="#333">Calibration Activations</text>

  <!-- Arrow from W to Quantize -->
  <line x1="230" y1="120" x2="300" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow from X to Quantize -->
  <line x1="230" y1="230" x2="300" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Step 1: Initial Quantization ===== -->
  <rect x="310" y="150" width="220" height="90" rx="10" fill="url(#grad-process)" stroke="#E65100" stroke-width="2"/>
  <text x="420" y="180" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Step 1</text>
  <text x="420" y="200" text-anchor="middle" font-size="14" fill="#333">Initial 4-bit</text>
  <text x="420" y="220" text-anchor="middle" font-size="14" fill="#333">Quantization of W</text>

  <!-- Arrow to compute error -->
  <line x1="530" y1="195" x2="590" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Step 2: Compute quantization error ===== -->
  <rect x="600" y="100" width="220" height="90" rx="10" fill="url(#grad-process)" stroke="#E65100" stroke-width="2"/>
  <text x="710" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Step 2</text>
  <text x="710" y="152" text-anchor="middle" font-size="14" fill="#333">Compute Output Error</text>
  <text x="710" y="172" text-anchor="middle" font-size="13" fill="#555">||XW − X·deq(Q(W·s))/s||²</text>

  <!-- ===== Step 3: Optimize scales ===== -->
  <rect x="600" y="220" width="220" height="90" rx="10" fill="url(#grad-opt)" stroke="#7B1FA2" stroke-width="2"/>
  <text x="710" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#7B1FA2">Step 3</text>
  <text x="710" y="272" text-anchor="middle" font-size="14" fill="#333">Optimize Scales s*</text>
  <text x="710" y="292" text-anchor="middle" font-size="13" fill="#555">s* = argmin L(s)</text>

  <!-- Circular arrow between Step 2 and Step 3 -->
  <path d="M 830 155 Q 870 195 830 260" stroke="#7B1FA2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 590 260 Q 560 195 590 150" stroke="#7B1FA2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="860" y="210" font-size="12" fill="#7B1FA2" font-style="italic">iterate</text>

  <!-- Arrow from Step 2 down to Step 3 -->

  <!-- Arrow to output -->
  <line x1="820" y1="265" x2="890" y2="265" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Output: Optimized scales ===== -->
  <rect x="900" y="80" width="270" height="80" rx="10" fill="url(#grad-output)" stroke="#2E7D32" stroke-width="2"/>
  <text x="1035" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">Optimal Scales s*</text>
  <text x="1035" y="135" text-anchor="middle" font-size="13" fill="#333">Per-channel scales that</text>
  <text x="1035" y="152" text-anchor="middle" font-size="13" fill="#333">minimize quantization error</text>

  <!-- Arrow to final output -->
  <line x1="1035" y1="160" x2="1035" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Final: Apply ===== -->
  <rect x="900" y="220" width="270" height="90" rx="10" fill="url(#grad-output)" stroke="#2E7D32" stroke-width="2"/>
  <text x="1035" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">Apply Scales</text>
  <text x="1035" y="272" text-anchor="middle" font-size="14" fill="#333">W_q = Q(W · s*)</text>
  <text x="1035" y="292" text-anchor="middle" font-size="13" fill="#555">4-bit compressed weights</text>

  <!-- ===== Legend ===== -->
  <rect x="30" y="390" width="1140" height="90" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="60" y="420" font-size="15" font-weight="bold" fill="#333">Key Idea:</text>
  <text x="60" y="445" font-size="14" fill="#444">Scale Estimation learns per-channel scale factors  s  such that the quantized output  X · deq(Q(W·s)) / s  closely</text>
  <text x="60" y="465" font-size="14" fill="#444">approximates the original output  X · W.  The scales are optimized iteratively to minimize the layer-wise reconstruction error.</text>

  <!-- Color legend -->
  <rect x="900" y="400" width="16" height="16" rx="3" fill="url(#grad-input)" stroke="#1565C0" stroke-width="1"/>
  <text x="922" y="413" font-size="12" fill="#333">Input</text>
  <rect x="970" y="400" width="16" height="16" rx="3" fill="url(#grad-process)" stroke="#E65100" stroke-width="1"/>
  <text x="992" y="413" font-size="12" fill="#333">Process</text>
  <rect x="1060" y="400" width="16" height="16" rx="3" fill="url(#grad-opt)" stroke="#7B1FA2" stroke-width="1"/>
  <text x="1082" y="413" font-size="12" fill="#333">Optimize</text>
  <rect x="900" y="425" width="16" height="16" rx="3" fill="url(#grad-output)" stroke="#2E7D32" stroke-width="1"/>
  <text x="922" y="438" font-size="12" fill="#333">Output</text>
</svg>
